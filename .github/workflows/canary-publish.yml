name: Canary Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only"
        required: false
        default: "true"
      canary_version:
        description: "Optional explicit version (e.g. 0.1.0-canary.20260523.abcd123)"
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  canary:
    name: Canary Publish
    runs-on: ubuntu-latest
    env:
      CANARY_VERSION: ${{ github.event.inputs.canary_version }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Core Doctor
        run: pnpm run doctor:core
      - name: Build Core
        run: pnpm run build:core
      - name: Unit Tests
        run: pnpm test
      - name: Bench Runtime
        run: pnpm run bench:runtime
      - name: Soak Runtime
        run: pnpm run soak:runtime
      - name: Canary Publish (Dry Run)
        if: ${{ github.event.inputs.dry_run != 'false' }}
        run: pnpm run release:canary:dry
      - name: Canary Publish (Live)
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: pnpm run release:canary
