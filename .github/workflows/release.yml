name: Release

on:
  push:
    tags:
      - "fanxipan-v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  create-cli-smoke:
    name: Create CLI Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Smoke Create Fanxipan
        run: pnpm run test:smoke:create

  release:
    runs-on: ubuntu-latest
    needs: create-cli-smoke
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify npm auth (token must allow publish)
        run: |
          npm whoami
          echo "Note: NPM_TOKEN must be an Automation token, or a granular token with bypass 2FA publish permission."

      - name: Build Core
        run: pnpm run build:core

      - name: Test Fanxipan
        run: pnpm run test:fanxipan

      - name: Check API Contract
        run: pnpm run check:api-contract

      - name: Release Gate
        run: pnpm run release:gate

      - name: Publish Stable
        run: pnpm run release:stable

      # Trusted Publishing note:
      # If npm Trusted Publisher is configured for this repo, NODE_AUTH_TOKEN
      # can be removed and publish can rely on OIDC + --provenance.
