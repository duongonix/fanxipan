name: Stable Publish

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (fanxipan-vX.Y.Z)"
        required: true
      dry_run:
        description: "Dry run only"
        required: false
        default: "true"

permissions:
  contents: write
  id-token: write

jobs:
  native-artifacts:
    name: Native Artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build Native
        run: pnpm --filter @fanxipan/node build
      - name: Upload Native Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fanxipan-node-${{ matrix.os }}
          path: packages/fanxipan-node/*.node

  publish:
    name: Publish Stable
    runs-on: ubuntu-latest
    needs: native-artifacts
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Release Gate
        run: pnpm run release:gate
      - name: Verify Fanxipan
        run: pnpm run verify:fanxipan
      - name: Publish Stable (Dry Run)
        if: ${{ github.event.inputs.dry_run != 'false' }}
        run: pnpm run release:stable:dry
      - name: Publish Stable (Live)
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: pnpm run release:stable
      - name: Download Native Artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts
      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry_run == 'false' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          generate_release_notes: true
          files: native-artifacts/**/*.node
